#Database Configuration.
db.hostname=mariadb
db.port=3306
db.database=habbo
db.username=hotel_user
db.password=secret
db.params=?characterEncoding=utf8&useSSL=false&serverTimezone=UTC
db.pool.minsize=8
db.pool.maxsize=12

#Encrypt your traffic - DISABLED
crypto.ws.enabled=false
crypto.ws.signing.enabled=false
crypto.ws.signing.public_key=
crypto.ws.signing.private_key=

#Game Configuration.
game.host=0.0.0.0
game.port=3000

#RCON Configuration.
rcon.host=0.0.0.0
rcon.port=3001
rcon.allowed=127.0.0.1

#WebSocket configuration (for Nitro)
ws.enabled=true
ws.host=0.0.0.0
ws.port=2096
ws.whitelist=*
ws.ip.header=X-Forwarded-For
ws.ip.header.trusted=172.18.0.0/16

# Database connection pool
db.pool.connection_timeout_ms=10000
db.pool.idle_timeout_ms=600000
db.pool.max_lifetime_ms=1800000
db.pool.validation_timeout_ms=5000
db.pool.leak_detection_ms=20000

enc.enabled=false

# Nitro secure runtime assets - ENABLED with proper paths
nitro.secure.assets.enabled=true
nitro.secure.api.enabled=true
nitro.secure.session_ttl_sec=900
nitro.secure.config.root=/nitro
nitro.secure.gamedata.root=/nitro
nitro.secure.master_key=xcleone-secret-key-2026

# Remember-me login tokens
login.remember.enabled=true
login.remember.duration.days=30
login.remember.jwt.secret=

# Login news API
login.news.limit=5
