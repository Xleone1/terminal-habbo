version: '3.8'
services:
  traefik:
    image: traefik:v2.10
    command:
      - --api.insecure=true
      - --providers.docker=true
      - --entryPoints.web.address=:80
      - --entryPoints.websecure.address=:443
      - --certificatesResolvers.le.acme.email=squadjao@gmail.com
      - --certificatesResolvers.le.acme.storage=/letsencrypt/acme.json
      - --certificatesResolvers.le.acme.tlsChallenge=true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/acme.json:/letsencrypt/acme.json
    networks:
      - web

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: hotel
      POSTGRES_USER: hotel_user
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - web

  node-gateway:
    build: ../services/node-gateway
    container_name: node-gateway
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ws.rule=Host(`ws.xcleone.me`)"
      - "traefik.http.routers.ws.entrypoints=websecure"
      - "traefik.http.routers.ws.tls=true"
    networks:
      - web

  laravel:
    image: php:8.2-fpm
    container_name: laravel-php
    working_dir: /var/www/html
    volumes:
      - ../services/laravel:/var/www/html
    depends_on:
      - postgres
    networks:
      - web

  laravel-nginx:
    image: nginx:stable-alpine
    depends_on:
      - laravel
    volumes:
      - ../services/laravel:/var/www/html:ro
      - ./traefik/nginx-laravel.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.xcleone.me`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls=true"
    networks:
      - web

  frontend:
    image: nginx:stable-alpine
    volumes:
      - ../apps/web/dist:/usr/share/nginx/html:ro
      - ./traefik/nginx-frontend.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`xcleone.me`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls=true"
    networks:
      - web

volumes:
  pgdata:

networks:
  web:
    driver: bridge
