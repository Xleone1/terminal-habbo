services:
  traefik:
    image: traefik:v3.6.1
    command:
      - --api.insecure=true
      - --api.dashboard=true
      - --providers.docker=true
      - --entryPoints.web.address=:80
      - --entryPoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entryPoint.to=websecure
      - --entrypoints.web.http.redirections.entryPoint.scheme=https
      - --certificatesresolvers.le.acme.email=squadjao@gmail.com
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.le.acme.httpchallenge=true
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/acme.json:/letsencrypt/acme.json
    networks:
      - web

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: hotel
      POSTGRES_USER: hotel_user
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - web

  node-gateway:
    build: ../services/node-gateway
    container_name: node-gateway
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ws.rule=Host(`ws.xcleone.me`)"
      - "traefik.http.routers.ws.entrypoints=websecure"
      - "traefik.http.routers.ws.tls=true"
      - "traefik.http.routers.ws.tls.certresolver=le"
      - "traefik.http.services.ws.loadbalancer.server.port=3000" # Maps to your node port
    networks:
      - web

  laravel:
    build: ../services/laravel
    container_name: laravel-php
    working_dir: /var/www/html
    volumes:
      - ../services/laravel:/var/www/html
    depends_on:
      - postgres
    networks:
      - web

  laravel-nginx:
    image: nginx:stable-alpine
    depends_on:
      - laravel
    volumes:
      - ../services/laravel:/var/www/html:ro
      - ./traefik/nginx-laravel.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.xcleone.me`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls=true"
      - "traefik.http.routers.api.tls.certresolver=le"
      - "traefik.http.services.api.loadbalancer.server.port=80"
    networks:
      - web

  frontend:
    image: nginx:stable-alpine
    volumes:
      - ../apps/web/dist:/usr/share/nginx/html:ro
      - ./traefik/nginx-frontend.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`xcleone.me`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls=true"
      - "traefik.http.routers.frontend.tls.certresolver=le"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
    networks:
      - web

volumes:
  pgdata:

networks:
  web:
    driver: bridge