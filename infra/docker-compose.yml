services:
  traefik:
    image: traefik:v3.6.1
    command:
      - --api.insecure=true
      - --api.dashboard=true
      - --providers.docker=true
      - --entryPoints.web.address=:80
      - --entryPoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entryPoint.to=websecure
      - --entrypoints.web.http.redirections.entryPoint.scheme=https
      - --certificatesresolvers.le.acme.email=squadjao@gmail.com
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.le.acme.httpchallenge=true
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/acme.json:/letsencrypt/acme.json
    networks:
      - web

  mariadb:
    image: mariadb:11
    container_name: mariadb
    environment:
      MARIADB_DATABASE: habbo
      MARIADB_USER: hotel_user
      MARIADB_PASSWORD: secret
      MARIADB_ROOT_PASSWORD: root
    volumes:
      - mysqldata:/var/lib/mysql
    networks:
      - web
    ports:
      - "127.0.0.1:3306:3306"

  node-gateway:
    build: ../services/node-gateway
    container_name: node-gateway
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ws.rule=Host(`ws.xcleone.me`)"
      - "traefik.http.routers.ws.entrypoints=websecure"
      - "traefik.http.routers.ws.tls=true"
      - "traefik.http.routers.ws.tls.certresolver=le"
      - "traefik.http.services.ws.loadbalancer.server.port=3000"
    networks:
      - web

  laravel:
    build: ../services/laravel
    container_name: laravel-php
    working_dir: /var/www/html
    volumes:
      - ../services/laravel:/var/www/html
      - /tmp:/tmp
    depends_on:
      - mariadb
    networks:
      - web

  laravel-nginx:
    image: nginx:stable-alpine
    depends_on:
      - laravel
    volumes:
      - ../services/laravel:/var/www/html:ro
      - ./traefik/nginx-laravel.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.xcleone.me`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls=true"
      - "traefik.http.routers.api.tls.certresolver=le"
      - "traefik.http.services.api.loadbalancer.server.port=80"
    networks:
      - web

  frontend:
    image: nginx:stable-alpine
    volumes:
      - ../apps/web/dist:/usr/share/nginx/html:ro
      - ./traefik/nginx-frontend.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`xcleone.me`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls=true"
      - "traefik.http.routers.frontend.tls.certresolver=le"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
    networks:
      - web

  paopao-static:
    image: nginx:stable-alpine
    container_name: paopao-static
    restart: unless-stopped
    volumes:
      - /var/www/paopao:/usr/share/nginx/html:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.paopao.rule=Host(`paopao.xcleone.me`)"
      - "traefik.http.routers.paopao.entrypoints=websecure"
      - "traefik.http.routers.paopao.tls=true"
      - "traefik.http.routers.paopao.tls.certresolver=le"
      - "traefik.http.services.paopao.loadbalancer.server.port=80"
    networks:
      - web

  arcturus:
    image: eclipse-temurin:21-jre-alpine
    container_name: arcturus
    working_dir: /emulator
    volumes:
      - ../services/arcturus/config/config.ini:/emulator/config.ini:ro
      - ../services/arcturus/Emulator/target/Habbo-4.2.45-jar-with-dependencies.jar:/emulator/Habbo.jar:ro
      - ../services/arcturus/Emulator/Plugins:/emulator/Plugins
      - ../apps/nitro-react/dist:/nitro:ro
    depends_on:
      - mariadb
    networks:
      - web
    command: ["java", "-Dfile.encoding=UTF8", "-Xmx4096m", "-jar", "Habbo.jar", "config.ini"]
    labels:
      - "traefik.enable=true"
    restart: unless-stopped

  nitro:
    image: nginx:stable-alpine
    container_name: nitro-client
    volumes:
      - ../apps/nitro-react/dist:/usr/share/nginx/html:ro
      - ./traefik/nginx-nitro.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nitro.rule=Host(`play.xcleone.me`)"
      - "traefik.http.routers.nitro.entrypoints=websecure"
      - "traefik.http.routers.nitro.tls=true"
      - "traefik.http.routers.nitro.tls.certresolver=le"
      - "traefik.http.services.nitro.loadbalancer.server.port=80"
    networks:
      - web
    depends_on:
      - arcturus

volumes:
  mysqldata:

networks:
  web:
    driver: bridge
