server {
    listen 80;
    server_name play.xcleone.me;

    root /usr/share/nginx/html;
    index index.html;

    # -----------------------------
    # WebSocket (Arcturus)
    # -----------------------------
location /game {
    proxy_pass http://arcturus:2096;

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";

    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    proxy_buffering off;
    proxy_read_timeout 3600;
}
    # -----------------------------
    # Nitro gamedata (STATIC FILES)
    # IMPORTANT: MUST NOT go to backend
    # -----------------------------
location ^~ /gamedata/ {
    alias /usr/share/nginx/html/gamedata/;
    access_log off;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
    add_header Access-Control-Allow-Origin "*";
    add_header Access-Control-Allow-Methods "GET, OPTIONS";
}    # -----------------------------
    # Nitro renderer config
    # -----------------------------
    location = /renderer-config.json {
        add_header Content-Type application/json;
        try_files $uri =404;
    }

    location = /ui-config.json {
        add_header Content-Type application/json;
        try_files $uri =404;
    }

    # -----------------------------
    # SPA fallback (Nitro frontend)
    # -----------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }
}
